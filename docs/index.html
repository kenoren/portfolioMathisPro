<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Mathis Fourey — Portfolio</title>
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        html,body{width:100%;height:100%;overflow:hidden;background:#0d0d1a;font-family:'Courier New',monospace}
        #c{position:fixed;inset:0;z-index:1;display:block}
        #portfolio-frame{position:fixed;inset:0;z-index:0;width:100%;height:100%;border:none;opacity:0;pointer-events:none;background:#080810;transition:opacity 1s ease}
        #flash{position:fixed;inset:0;z-index:30;background:#c8ff3e;opacity:0;pointer-events:none;transition:opacity .2s ease}
        #portal{position:fixed;inset:0;z-index:29;pointer-events:none;opacity:0;transition:opacity .35s ease;background:radial-gradient(circle at center,rgba(200,255,62,.25) 0%,rgba(62,255,200,.16) 22%,rgba(4,8,20,.92) 64%,rgba(0,0,0,1) 100%)}
        
        /* Custom cursor */
        *{cursor:none}
        #cur{position:fixed;pointer-events:none;z-index:200;width:12px;height:12px;border-radius:50%;background:#c8ff3e;transform:translate(-50%,-50%);mix-blend-mode:exclusion;transition:transform .15s ease,opacity .2s;top:0;left:0;box-shadow:0 0 12px rgba(200,255,62,.8)}
        #cur-ring{position:fixed;pointer-events:none;z-index:199;width:40px;height:40px;border-radius:50%;border:1.5px solid rgba(200,255,62,.4);transform:translate(-50%,-50%);transition:width .25s cubic-bezier(.34,1.56,.64,1),height .25s cubic-bezier(.34,1.56,.64,1),border-color .3s,opacity .2s;top:0;left:0}
        #cur.hover{transform:translate(-50%,-50%) scale(3);opacity:.6}
        #cur-ring.hover{width:70px;height:70px;border-color:#c8ff3e;border-width:1px}

        /* Loading */
        #loading{position:fixed;inset:0;z-index:100;background:#0d0d1a;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2.8rem;transition:opacity 1.2s ease}
        #loading.out{opacity:0;pointer-events:none}
        .ld-logo{font-size:clamp(1.4rem,4vw,2.4rem);letter-spacing:.35em;text-transform:uppercase;color:#e0e0f0;text-align:center;font-weight:300}
        .ld-logo strong{color:#c8ff3e;font-weight:700}
        .ld-bar-wrap{width:320px;height:2px;background:rgba(255,255,255,.06);position:relative;overflow:hidden;border-radius:2px}
        .ld-bar{height:100%;width:0;background:linear-gradient(90deg,#c8ff3e,#3effc8);transition:width .12s linear;border-radius:2px}
        .ld-bar-wrap::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.5),transparent);animation:sh 1.8s infinite}
        @keyframes sh{0%{transform:translateX(-100%)}100%{transform:translateX(300%)}}
        .ld-txt{font-size:.6rem;letter-spacing:.22em;text-transform:uppercase;color:rgba(255,255,255,.2);min-height:1em}
        .ld-dot{display:inline-block;animation:ldot 1.4s infinite}
        .ld-dot:nth-child(2){animation-delay:.2s}.ld-dot:nth-child(3){animation-delay:.4s}
        @keyframes ldot{0%,80%,100%{opacity:.2}40%{opacity:1}}

        /* HUD nametag */
        #nametag{position:fixed;top:2.5rem;left:2.8rem;z-index:10;opacity:0;pointer-events:none;transition:opacity 1.2s ease}
        #nametag.show{opacity:1}
        .nt1{font-size:.58rem;letter-spacing:.28em;text-transform:uppercase;color:rgba(255,255,255,.25);margin-bottom:.3rem}
        .nt2{font-size:clamp(1.6rem,3.8vw,2.4rem);font-weight:800;letter-spacing:-.02em;color:#fff;line-height:1}
        .nt2 em{color:#c8ff3e;font-style:normal}
        .nt3{font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;color:rgba(200,255,62,.5);margin-top:.35rem;font-weight:400}
        .nt-status{display:flex;align-items:center;gap:.55rem;margin-top:.6rem}
        .nt-dot{width:7px;height:7px;border-radius:50%;background:#c8ff3e;animation:blink 2.4s infinite;box-shadow:0 0 8px rgba(200,255,62,.6)}
        @keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}
        .nt-status-txt{font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;color:rgba(200,255,62,.55)}

        /* Controls */
        #controls{position:fixed;bottom:3rem;right:3.2rem;z-index:10;opacity:0;pointer-events:none;transition:opacity 1.2s ease;text-align:center}
        #controls.show{opacity:1}
        .ctrl-grid{display:flex;flex-direction:column;align-items:center;gap:.3rem}
        .ctrl-row{display:flex;gap:.3rem}
        .k{width:32px;height:32px;display:flex;align-items:center;justify-content:center;border:1.5px solid rgba(255,255,255,.1);border-radius:7px;background:rgba(255,255,255,.04);font-size:.62rem;color:rgba(255,255,255,.35);font-family:inherit;backdrop-filter:blur(4px)}
        .ctrl-hint{font-size:.52rem;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.15);margin-top:.7rem}

        /* Speed */
        #speed{position:fixed;top:2.5rem;right:3.2rem;z-index:10;opacity:0;pointer-events:none;transition:opacity 1.2s ease;text-align:right}
        #speed.show{opacity:1}
        .spv{font-size:2.4rem;font-weight:800;color:rgba(200,255,62,.8);line-height:1;letter-spacing:-.04em;font-variant-numeric:tabular-nums}
        .spu{font-size:.52rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.18);margin-top:.1rem}

        /* Click hint */
        #click-hint{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:10;text-align:center;opacity:0;pointer-events:none;transition:opacity .4s ease}
        #click-hint.show{opacity:1}
        .ch-text{font-size:.78rem;letter-spacing:.32em;text-transform:uppercase;color:#c8ff3e;text-shadow:0 0 30px rgba(200,255,62,.8),0 0 60px rgba(200,255,62,.3);animation:pulse 1.8s ease-in-out infinite}
        @keyframes pulse{0%,100%{opacity:1;text-shadow:0 0 30px rgba(200,255,62,.8),0 0 60px rgba(200,255,62,.3)}50%{opacity:.3;text-shadow:none}}
        .ch-sub{font-size:.52rem;letter-spacing:.22em;text-transform:uppercase;color:rgba(255,255,255,.2);margin-top:.7rem}

        /* Vignette */
        #vig{position:fixed;inset:0;z-index:2;pointer-events:none;background:radial-gradient(ellipse 80% 80% at 50% 50%,transparent 40%,rgba(0,0,0,.6) 100%)}
        #corners{position:fixed;inset:0;z-index:5;pointer-events:none}
        .corner{position:absolute;width:44px;height:44px;border-color:rgba(200,255,62,.18);border-style:solid}
        .corner.tl{top:1.6rem;left:1.6rem;border-width:1px 0 0 1px}
        .corner.tr{top:1.6rem;right:1.6rem;border-width:1px 1px 0 0}
        .corner.bl{bottom:1.6rem;left:1.6rem;border-width:0 0 1px 1px}
        .corner.br{bottom:1.6rem;right:1.6rem;border-width:0 1px 1px 0}
    </style>
</head>
<body>
<canvas id="c"></canvas>
<iframe id="portfolio-frame" src="about:blank" title="Portfolio"></iframe>
<div id="flash"></div>
<div id="portal"></div>
<div id="cur"></div>
<div id="cur-ring"></div>
<div id="vig"></div>
<div id="corners">
    <div class="corner tl"></div><div class="corner tr"></div>
    <div class="corner bl"></div><div class="corner br"></div>
</div>

<div id="loading">
    <div><div class="ld-logo">Mathis <strong>Fourey</strong></div></div>
    <div class="ld-bar-wrap"><div class="ld-bar" id="ld-bar"></div></div>
    <div class="ld-txt" id="ld-msg">Initialisation<span class="ld-dot">.</span><span class="ld-dot">.</span><span class="ld-dot">.</span></div>
</div>

<div id="nametag">
    <div class="nt1">Portfolio de</div>
    <div class="nt2">Mathis <em>Fourey</em></div>
    <div class="nt3">Développeur Fullstack · Licence Web &amp; Mobile</div>
    <div class="nt-status"><div class="nt-dot"></div><span class="nt-status-txt">Disponible en alternance 2026</span></div>
</div>

<div id="controls">
    <div class="ctrl-grid">
        <div class="ctrl-row"><div class="k">W</div></div>
        <div class="ctrl-row"><div class="k">A</div><div class="k">S</div><div class="k">D</div></div>
    </div>
    <div class="ctrl-hint">Orbiter la scène</div>
</div>

<div id="speed">
    <div class="spv" id="spv">0.0</div>
    <div class="spu">vitesse</div>
</div>

<div id="click-hint">
    <div class="ch-text">→ Cliquer pour entrer ←</div>
    <div class="ch-sub">Cliquer sur l'écran</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
'use strict';

// ─── RENDERER ────────────────────────────────────────────────
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true, powerPreference:'high-performance'});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x0d0d1a, 1);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.55;

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x12102a, 0.008);
const camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 200);
camera.position.set(0, 5.5, 15);

// ─── STATE ───────────────────────────────────────────────────
let entered=false, animating=false;
let camTheta=0, camPhi=0.3, camDist=15;
const CAM_LOOK = new THREE.Vector3(0, 2.2, 0);
const camLookCur = new THREE.Vector3(0, 2.2, 0);
const keys={w:false,a:false,s:false,d:false};
const mouse={x:0,y:0,down:false,lx:0,ly:0};
let hovering=false;
let clock=0;
let speedDisplay=0;

// ─── LOADING ─────────────────────────────────────────────────
const msgs=['Préparation de la scène…','Construction du mobilier…','Éclairage & matériaux…','Personnage en place…','Touches finales…','Prêt !'];
let pct=0;
function load(to,mi){
    pct=to;
    document.getElementById('ld-bar').style.width=to+'%';
    if(mi!=null) document.getElementById('ld-msg').innerHTML=msgs[mi]+'<span class="ld-dot">.</span><span class="ld-dot">.</span><span class="ld-dot">.</span>';
    if(to>=100) setTimeout(finishLoad,500);
}
function finishLoad(){
    const el=document.getElementById('loading');
    el.classList.add('out');
    setTimeout(()=>{ el.remove(); showHUD(); },1200);
}
function showHUD(){
    ['nametag','controls','speed'].forEach(id=>document.getElementById(id).classList.add('show'));
}

// ─── WALLPAPER TEXTURE (procedural) ──────────────────────────
function makeWallpaperTexture(){
    const cvs=document.createElement('canvas');
    cvs.width=512; cvs.height=512;
    const c=cvs.getContext('2d');
    // Base color — deep muted teal-navy
    c.fillStyle='#1a1f3a';
    c.fillRect(0,0,512,512);
    // Subtle vertical stripe
    for(let x=0;x<512;x+=32){
        const g=c.createLinearGradient(x,0,x+32,0);
        g.addColorStop(0,'rgba(255,255,255,0.0)');
        g.addColorStop(0.5,'rgba(255,255,255,0.025)');
        g.addColorStop(1,'rgba(255,255,255,0.0)');
        c.fillStyle=g;
        c.fillRect(x,0,32,512);
    }
    // Diamond/herringbone pattern
    c.save();
    c.strokeStyle='rgba(200,200,255,0.06)';
    c.lineWidth=1;
    const sz=48;
    for(let y=-sz;y<512+sz;y+=sz){
        for(let x=-sz;x<512+sz;x+=sz){
            c.beginPath();
            c.moveTo(x+sz/2, y);
            c.lineTo(x+sz, y+sz/2);
            c.lineTo(x+sz/2, y+sz);
            c.lineTo(x, y+sz/2);
            c.closePath();
            c.stroke();
        }
    }
    c.restore();
    // Tiny dots at intersections
    c.fillStyle='rgba(200,220,255,0.07)';
    for(let y=0;y<512;y+=sz){
        for(let x=0;x<512;x+=sz){
            c.beginPath();
            c.arc(x+sz/2, y+sz/2, 2.5, 0, Math.PI*2);
            c.fill();
        }
    }
    const tex=new THREE.CanvasTexture(cvs);
    tex.wrapS=tex.wrapT=THREE.RepeatWrapping;
    tex.repeat.set(5, 5);
    return tex;
}

function makeWallpaperMat(rough=0.92){
    const tex=makeWallpaperTexture();
    return new THREE.MeshStandardMaterial({map:tex, roughness:rough, metalness:0.02, color:0xffffff});
}

// ─── FLOOR TEXTURE ───────────────────────────────────────────
function makeFloorTexture(){
    const cvs=document.createElement('canvas');
    cvs.width=512; cvs.height=512;
    const c=cvs.getContext('2d');
    // Parquet wood planks
    const planks=[
        {x:0,w:128,col:'#2a1f12'},{x:128,w:102,col:'#261c10'},{x:230,w:115,col:'#2d2214'},
        {x:345,w:95,col:'#231b0e'},{x:440,w:72,col:'#2a1f12'}
    ];
    planks.forEach(p=>{
        c.fillStyle=p.col; c.fillRect(p.x,0,p.w,512);
        // Wood grain lines
        c.strokeStyle='rgba(0,0,0,0.12)'; c.lineWidth=1;
        for(let y=0;y<512;y+=18+Math.random()*12){
            c.beginPath();
            let lx=p.x;
            c.moveTo(lx,y);
            for(let sx=0;sx<p.w;sx+=8){ c.lineTo(lx+sx, y+Math.sin(sx*.2+y*.1)*1.5); }
            c.stroke();
        }
        // Plank border
        c.strokeStyle='rgba(0,0,0,0.25)'; c.lineWidth=1.5;
        c.strokeRect(p.x+.75,0,p.w-1.5,512);
    });
    const tex=new THREE.CanvasTexture(cvs);
    tex.wrapS=tex.wrapT=THREE.RepeatWrapping;
    tex.repeat.set(3,3);
    return tex;
}

// ─── GEOMETRY HELPERS ────────────────────────────────────────
const root = new THREE.Group();
scene.add(root);

function mstd(hex,rough=0.8,metal=0,em=0,emI=0){
    return new THREE.MeshStandardMaterial({color:hex,roughness:rough,metalness:metal,emissive:em||0,emissiveIntensity:emI});
}
function place(geo,mat,x,y,z,rx=0,ry=0,rz=0,cast=true,recv=true){
    const m=new THREE.Mesh(geo,mat);
    m.position.set(x,y,z);
    m.rotation.set(rx,ry,rz);
    m.castShadow=cast; m.receiveShadow=recv;
    root.add(m); return m;
}
function bx(w,h,d,col,rough,metal,x,y,z,rx=0,ry=0,rz=0,cast=true,recv=true,em=0,emI=0){
    return place(new THREE.BoxGeometry(w,h,d),mstd(col,rough,metal,em,emI),x,y,z,rx,ry,rz,cast,recv);
}
function cyl(rt,rb,h,seg,col,rough,metal,x,y,z,rx=0,ry=0,rz=0){
    return place(new THREE.CylinderGeometry(rt,rb,h,seg),mstd(col,rough,metal),x,y,z,rx,ry,rz);
}
function sph(r,col,rough,metal,x,y,z,cast=true){
    return place(new THREE.SphereGeometry(r,20,16),mstd(col,rough,metal),x,y,z,0,0,0,cast);
}
// Rounded box using stretched sphere trick — gives cartoon look
function roundBox(w,h,d,r,mat,x,y,z,rx=0,ry=0,rz=0,cast=true,recv=true){
    const geo=new THREE.BoxGeometry(w,h,d,1,1,1);
    const pos=geo.attributes.position;
    for(let i=0;i<pos.count;i++){
        const v=new THREE.Vector3(pos.getX(i),pos.getY(i),pos.getZ(i));
        const nx=Math.max(Math.abs(v.x)-w/2+r,0);
        const ny=Math.max(Math.abs(v.y)-h/2+r,0);
        const nz=Math.max(Math.abs(v.z)-d/2+r,0);
        const len=Math.sqrt(nx*nx+ny*ny+nz*nz)||0.001;
        pos.setXYZ(i,v.x+(nx/len-0)*r*Math.sign(v.x||1)*0,v.y,v.z);
    }
    geo.computeVertexNormals();
    const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat);
    m.position.set(x,y,z);
    m.rotation.set(rx,ry,rz);
    m.castShadow=cast; m.receiveShadow=recv;
    root.add(m); return m;
}

// ─── ROOM ────────────────────────────────────────────────────
const DH=1.05; // desk height
let screenMesh, screenMat, screenTex;

function buildRoom(){
    // Floor — parquet
    const floorTex=makeFloorTexture();
    const flMat=new THREE.MeshStandardMaterial({map:floorTex,roughness:.82,metalness:.04});
    const fl=new THREE.Mesh(new THREE.PlaneGeometry(22,18),flMat);
    fl.rotation.x=-Math.PI/2; fl.receiveShadow=true; root.add(fl);

    const wMat=makeWallpaperMat(.88);
    const wMatSide=makeWallpaperMat(.9);

    // Back wall
    place(new THREE.BoxGeometry(22,.14,18),mstd(0x141824,.96,.04),0,12.07,0,0,0,0,false,false);
    const backW=new THREE.Mesh(new THREE.PlaneGeometry(22,12),wMat);
    backW.position.set(0,6,-9); backW.receiveShadow=true; root.add(backW);

    // Left wall
    const leftW=new THREE.Mesh(new THREE.PlaneGeometry(18,12),wMatSide);
    leftW.position.set(-11,6,0); leftW.rotation.y=Math.PI/2; leftW.receiveShadow=true; root.add(leftW);

    // Right wall
    const rightW=new THREE.Mesh(new THREE.PlaneGeometry(18,12),wMatSide);
    rightW.position.set(11,6,0); rightW.rotation.y=-Math.PI/2; rightW.receiveShadow=true; root.add(rightW);

    // Ceiling
    const ceilMat=new THREE.MeshStandardMaterial({color:0xf0eee6,roughness:.95,metalness:0});
    const ceil=new THREE.Mesh(new THREE.PlaneGeometry(22,18),ceilMat);
    ceil.rotation.x=Math.PI/2; ceil.position.y=12; root.add(ceil);

    // Crown molding (cartoon-thick)
    const moldM=mstd(0xe8e4d8,.88,0);
    place(new THREE.BoxGeometry(22,.22,.22),moldM,0,11.9,-8.89,0,0,0,false,false);
    place(new THREE.BoxGeometry(.22,.22,18),moldM,-10.89,11.9,0,0,0,0,false,false);
    place(new THREE.BoxGeometry(.22,.22,18),moldM,10.89,11.9,0,0,0,0,false,false);
    // Baseboard
    const baseM=mstd(0xe0dcd0,.85,0);
    place(new THREE.BoxGeometry(22,.3,.08),baseM,0,.15,-8.96,0,0,0,false,true);
    place(new THREE.BoxGeometry(.08,.3,18),baseM,-10.96,.15,0,0,0,0,false,true);
    place(new THREE.BoxGeometry(.08,.3,18),baseM,10.96,.15,0,0,0,0,false,true);

    // Rug — large, patterned look
    const rugMat=new THREE.MeshStandardMaterial({color:0x7a3f3f,roughness:.97,metalness:0});
    place(new THREE.PlaneGeometry(5.5,4.2),rugMat,.1,.012,1.5,-Math.PI/2,0,0,false,false);
    // Rug border stripes
    const rb=mstd(0xd4b88c,.9,0);
    place(new THREE.PlaneGeometry(5.5,.18),rb,.1,.013,-.52,-Math.PI/2,0,0,false);
    place(new THREE.PlaneGeometry(5.5,.18),rb,.1,.013,3.52,-Math.PI/2,0,0,false);
    place(new THREE.PlaneGeometry(.18,4.2),rb,-2.57,.013,1.5,-Math.PI/2,0,0,false);
    place(new THREE.PlaneGeometry(.18,4.2),rb,2.77,.013,1.5,-Math.PI/2,0,0,false);

    // Window — large, cartoon-framed
    const winFrameM=mstd(0xf0ece2,.75,.05);
    // Frame thick outer
    place(new THREE.BoxGeometry(3.8,.2,.18),winFrameM,5,6.12,-8.9,0,0,0,false,true);
    place(new THREE.BoxGeometry(3.8,.2,.18),winFrameM,5,8.72,-8.9,0,0,0,false,true);
    place(new THREE.BoxGeometry(.2,2.8,.18),winFrameM,3.12,7.42,-8.9,0,0,0,false,true);
    place(new THREE.BoxGeometry(.2,2.8,.18),winFrameM,6.88,7.42,-8.9,0,0,0,false,true);
    // Cross divider
    place(new THREE.BoxGeometry(3.6,.1,.12),winFrameM,5,7.4,-8.9,0,0,0,false,false);
    place(new THREE.BoxGeometry(.1,2.6,.12),winFrameM,5,7.4,-8.9,0,0,0,false,false);
    // Glass — glowing blue daylight
    const glassMat=new THREE.MeshStandardMaterial({color:0x87c8ff,emissive:0x5599cc,emissiveIntensity:.35,roughness:.06,metalness:.1,transparent:true,opacity:.55});
    place(new THREE.PlaneGeometry(3.6,2.58),glassMat,5,7.42,-8.88,0,0,0,false,false);
    // Curtains — soft draping using multiple pieces
    const curtM=mstd(0x3d2e5c,.82,0);
    // Left curtain
    place(new THREE.BoxGeometry(.55,3.6,.08),curtM,2.78,7.2,-8.82,0,0,.05,true,false);
    place(new THREE.BoxGeometry(.55,3.6,.08),curtM,2.65,7.2,-8.72,0,0,.03,false,false);
    // Right curtain
    place(new THREE.BoxGeometry(.55,3.6,.08),curtM,7.22,7.2,-8.82,0,0,-.05,true,false);
    place(new THREE.BoxGeometry(.55,3.6,.08),curtM,7.35,7.2,-8.72,0,0,-.03,false,false);
    // Curtain rod
    cyl(.03,.03,.05,12,0xa89070,.3,.6,4.5,9.0,-8.7);
    place(new THREE.BoxGeometry(5.2,.05,.05),mstd(0xa89070,.3,.6),5,9.0,-8.7,0,0,0,false,false);
    cyl(.03,.03,.05,12,0xa89070,.3,.6,5.5,9.0,-8.7);

    // Framed art — left wall
    const artFrameM=mstd(0x4a3828,.55,.15);
    place(new THREE.BoxGeometry(2.6,1.8,.1),artFrameM,-8.5,5.8,-4,0,Math.PI/2,0,false,true);
    const artMat=new THREE.MeshStandardMaterial({color:0x1a2840,emissive:0x0a1428,emissiveIntensity:.12,roughness:.9});
    place(new THREE.PlaneGeometry(2.3,1.5),artMat,-10.92,5.8,-4,0,Math.PI/2,0,false,false);
    // Art content — abstract geometric

function drawScreen(t){
    const W=1024,H=576,c=pctx;
    c.clearRect(0,0,W,H);
    // Background gradient
    const bg=c.createLinearGradient(0,0,0,H);
    bg.addColorStop(0,'#080c18'); bg.addColorStop(1,'#050810');
    c.fillStyle=bg; c.fillRect(0,0,W,H);
    // Subtle grid
    c.strokeStyle='rgba(200,220,255,0.04)'; c.lineWidth=1;
    for(let i=0;i<W;i+=48){c.beginPath();c.moveTo(i,0);c.lineTo(i,H);c.stroke();}
    for(let j=0;j<H;j+=48){c.beginPath();c.moveTo(0,j);c.lineTo(W,j);c.stroke();}
    // Navbar
    c.fillStyle='rgba(8,10,22,.95)'; c.fillRect(0,0,W,52);
    c.fillStyle='rgba(255,255,255,.05)'; c.fillRect(0,51,W,1);
    c.font='bold 24px monospace'; c.fillStyle='#f0f0fa'; c.fillText('M.',30,36);
    c.fillStyle='#c8ff3e'; c.fillText('F.',58,36);
    ['Accueil','Projets','CV','Veille','Contact'].forEach((l,i)=>{
        c.fillStyle='rgba(160,160,200,.65)'; c.font='11px monospace'; c.fillText(l,200+i*105,34);
    });
    // CTA pill
    const pp=Math.sin(t*.002)*.3+.7;
    c.fillStyle=`rgba(200,255,62,${pp*.11})`;
    c.beginPath(); c.roundRect&&c.roundRect(30,70,300,28,14)||c.rect(30,70,300,28);
    c.fill();
    c.strokeStyle=`rgba(200,255,62,${pp*.5})`; c.lineWidth=1;
    c.beginPath(); c.roundRect&&c.roundRect(30,70,300,28,14)||c.rect(30,70,300,28);
    c.stroke();
    const dotPulse=Math.sin(t*.003)*.3+.7;
    c.fillStyle=`rgba(200,255,62,${dotPulse})`; c.beginPath(); c.arc(48,84,5.5,0,Math.PI*2); c.fill();
    c.fillStyle='rgba(200,255,62,.9)'; c.font='bold 11px monospace'; c.fillText('Disponible en alternance 2026',62,88);
    // Main heading
    c.font='bold 88px sans-serif'; c.fillStyle='#eeeef8'; c.fillText('Mathis',32,190);
    const gy=c.createLinearGradient(32,210,200,270);
    gy.addColorStop(0,'#c8ff3e'); gy.addColorStop(1,'#5effd4');
    c.font='italic 84px Georgia,serif'; c.fillStyle=gy; c.fillText('Fourey',32,274);
    // Description
    c.fillStyle='rgba(120,125,170,.85)'; c.font='13px monospace';
    c.fillText('Développeur Fullstack & Licence Web & Mobile',32,315);
    c.fillText('Du backend au pixel près.',32,336);
    // Buttons
    c.fillStyle='#c8ff3e'; c.beginPath(); c.roundRect&&c.roundRect(32,364,186,40,5)||c.rect(32,364,186,40); c.fill();
    c.fillStyle='#080c18'; c.font='bold 13px sans-serif'; c.fillText('Voir mes projets',55,389);
    c.strokeStyle='rgba(255,255,255,.15)'; c.lineWidth=1;
    c.beginPath(); c.roundRect&&c.roundRect(228,364,140,40,5)||c.rect(228,364,140,40); c.stroke();
    c.fillStyle='rgba(160,160,200,.75)'; c.font='bold 13px sans-serif'; c.fillText('Me contacter',250,389);
    // Stats
    c.fillStyle='rgba(255,255,255,.03)'; c.fillRect(32,420,W-64,54);
    [{n:'3+',l:'Projets'},{n:'2 ans',l:'BTS SIO'},{n:'2026',l:'Alternance'}].forEach(({n,l},i)=>{
        c.fillStyle='#c8ff3e'; c.font='bold 26px monospace'; c.fillText(n,82+i*245,452);
        c.fillStyle='rgba(140,140,180,.65)'; c.font='10px monospace'; c.fillText(l,82+i*245,468);
    });
    // Particles
    for(let i=0;i<8;i++){
        const px=640+Math.sin(t*.0012+i*1.3)*190, py=160+Math.cos(t*.0009+i*.85)*120;
        const a=Math.sin(t*.002+i*.7)*.2+.08;
        c.fillStyle=`rgba(200,255,62,${a})`; c.beginPath(); c.arc(px,py,2,0,Math.PI*2); c.fill();
    }
    // Right glow panel
    const rg=c.createLinearGradient(680,0,W,H);
    rg.addColorStop(0,'rgba(0,30,60,.0)'); rg.addColorStop(1,'rgba(10,20,50,.55)');
    c.fillStyle=rg; c.fillRect(680,0,344,H);
    // Screen glow from top

    vign.addColorStop(0,'rgba(0,0,0,0)'); vign.addColorStop(1,'rgba(0,0,0,.5)');
    c.fillStyle=vign; c.fillRect(0,0,W,H);
}

// ─── PARTICLES — STEAM & DUST ────────────────────────────────
const N_STEAM=28;
let steamGeo,steamPos,steamVel=[],steamPhase=[];
function buildSteam(){
    steamGeo=new THREE.BufferGeometry();
    steamPos=new Float32Array(N_STEAM*3);
    for(let i=0;i<N_STEAM;i++){
        steamPos[i*3]=1.7+(Math.random()-.5)*.08;
        steamPos[i*3+1]=1.3+Math.random()*.3;
        steamPos[i*3+2]=.15+(Math.random()-.5)*.06;
        steamVel.push((Math.random()-.5)*.003,.005+Math.random()*.007,(Math.random()-.5)*.003);
        steamPhase.push(Math.random()*Math.PI*2);
    }
    steamGeo.setAttribute('position',new THREE.BufferAttribute(steamPos,3));
    const pm=new THREE.PointsMaterial({color:0xffffff,size:.026,transparent:true,opacity:.22,sizeAttenuation:true});
    root.add(new THREE.Points(steamGeo,pm));
}

const N_DUST=180;
let dustGeo,dustPos,dustVel=[];
function buildDust(){
    dustGeo=new THREE.BufferGeometry();
    dustPos=new Float32Array(N_DUST*3);
    for(let i=0;i<N_DUST;i++){
        dustPos[i*3]=(Math.random()-.5)*18;
        dustPos[i*3+1]=Math.random()*9;
        dustPos[i*3+2]=(Math.random()-.5)*14;
        dustVel.push((Math.random()-.5)*.004,.0015+Math.random()*.004,(Math.random()-.5)*.004);
    }
    dustGeo.setAttribute('position',new THREE.BufferAttribute(dustPos,3));
    const dm=new THREE.PointsMaterial({color:0xd0e8ff,size:.022,transparent:true,opacity:.14,sizeAttenuation:true});
    root.add(new THREE.Points(dustGeo,dm));
}

// ─── INPUT ───────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
    const k=e.key.toLowerCase();
    if(k==='w'||k==='arrowup') keys.w=true;
    if(k==='a'||k==='arrowleft') keys.a=true;
    if(k==='s'||k==='arrowdown') keys.s=true;
    if(k==='d'||k==='arrowright') keys.d=true;
});
document.addEventListener('keyup',e=>{
    const k=e.key.toLowerCase();
    if(k==='w'||k==='arrowup') keys.w=false;
    if(k==='a'||k==='arrowleft') keys.a=false;
    if(k==='s'||k==='arrowdown') keys.s=false;
    if(k==='d'||k==='arrowright') keys.d=false;
});
document.addEventListener('mousemove',e=>{
    mouse.x=(e.clientX/window.innerWidth)*2-1;
    mouse.y=-(e.clientY/window.innerHeight)*2+1;
    if(mouse.down&&!animating&&!entered){
        camTheta-=(e.clientX-mouse.lx)*.003;
        camPhi-=(e.clientY-mouse.ly)*.003;
        camPhi=Math.max(.04,Math.min(.62,camPhi));
    }
    mouse.lx=e.clientX; mouse.ly=e.clientY;
    const cur=document.getElementById('cur'),ring=document.getElementById('cur-ring');
    cur.style.left=e.clientX+'px'; cur.style.top=e.clientY+'px';
    ring.style.left=e.clientX+'px'; ring.style.top=e.clientY+'px';
});
document.addEventListener('mousedown',e=>{mouse.down=true;mouse.lx=e.clientX;mouse.ly=e.clientY;});
document.addEventListener('mouseup',()=>mouse.down=false);
document.addEventListener('wheel',e=>{
    if(animating||entered) return;
    camDist=Math.max(3.5,Math.min(22,camDist+e.deltaY*.012));
},{passive:true});

const raycaster=new THREE.Raycaster();
const mVec=new THREE.Vector2();
document.addEventListener('click',()=>{
    if(animating||entered||!screenMesh) return;
    mVec.set(mouse.x,mouse.y);
    raycaster.setFromCamera(mVec,camera);
    if(raycaster.intersectObject(screenMesh).length>0) triggerEntry();
});

// ─── ENTRY TRANSITION ────────────────────────────────────────
function triggerEntry(){
    if(animating||entered) return;
    animating=true;
    ['nametag','controls','speed'].forEach(id=>document.getElementById(id).classList.remove('show'));
    document.getElementById('click-hint').classList.remove('show');
    document.getElementById('portfolio-frame').src='index.html?from=intro3d';
    doZoom();
}
function easeInOutQuart(t){return t<.5?8*t*t*t*t:1-Math.pow(-2*t+2,4)/2;}
function easeInQuint(t){return t*t*t*t*t;}
function doZoom(){
    const MZ=-.55,MY=DH+.05+.62;
    const portal=document.getElementById('portal');
    const endPos=new THREE.Vector3(0,MY,MZ+1.62);
    const startPos=camera.position.clone();
    const startLook=camLookCur.clone();
    const endLook=new THREE.Vector3(0,MY,MZ);
    const DUR_A=1900,DUR_D=1250,t0=performance.now();
    const baseFov=camera.fov;
    function step(ts){
        const e=ts-t0;
        const ar=Math.min(e/DUR_A,1);
        if(ar<1){
            const p=easeInOutQuart(ar);
            camera.position.lerpVectors(startPos,endPos,p);
            camera.lookAt(new THREE.Vector3().lerpVectors(startLook,endLook,p));
            if(screenMat) screenMat.emissiveIntensity=.75+p*2.5;
            if(screenLit) screenLit.intensity=3.2+p*10;
            portal.style.opacity=(p*.45).toFixed(3);
            requestAnimationFrame(step); return;
        }
        const dr=Math.min((e-DUR_A)/DUR_D,1),pd=easeInQuint(dr);
        camera.position.z=endPos.z-pd*1.5;
        camera.position.y=endPos.y+pd*.04;
        camera.lookAt(endLook);
        camera.fov=baseFov+pd*30; camera.updateProjectionMatrix();
        if(screenMat) screenMat.emissiveIntensity=3.2+pd*4.5;
        if(screenLit) screenLit.intensity=13+pd*14;
        portal.style.opacity=(.45+pd*.55).toFixed(3);
        if(dr<1) requestAnimationFrame(step);
        else{ camera.fov=baseFov; camera.updateProjectionMatrix(); finishEntry(); }
    }
    requestAnimationFrame(step);
}
function finishEntry(){
    const frame=document.getElementById('portfolio-frame');
    const flash=document.getElementById('flash'),portal=document.getElementById('portal');
    flash.style.opacity='.6';
    setTimeout(()=>{flash.style.opacity='0';},180);
    portal.style.opacity='1';
    setTimeout(()=>{
        frame.style.opacity='1'; frame.style.pointerEvents='auto';
        setTimeout(()=>{
            canvas.style.transition='opacity .6s ease'; canvas.style.opacity='0';
            portal.style.transition='opacity .65s ease'; portal.style.opacity='0';
            ['vig','corners','cur','cur-ring'].forEach(id=>document.getElementById(id).style.display='none');
            setTimeout(()=>{canvas.style.display='none';entered=true;animating=false;},600);
        },600);
    },480);
}

// ─── UPDATE ──────────────────────────────────────────────────
function updateCam(dt){
    if(animating||entered) return;
    let spd=0;
    if(keys.w){camDist-=6*dt;spd=65;}
    if(keys.s){camDist+=6*dt;spd=32;}
    if(keys.a){camTheta-=1.5*dt;spd=45;}
    if(keys.d){camTheta+=1.5*dt;spd=45;}
    camDist=Math.max(3.5,Math.min(22,camDist));
    const tPhi=Math.max(.04,Math.min(.62,camPhi-mouse.y*.08));
    const tTheta=camTheta+mouse.x*.15;
    camera.position.set(
        camDist*Math.sin(tTheta)*Math.cos(tPhi),
        camDist*Math.sin(tPhi)+1.6,
        camDist*Math.cos(tTheta)*Math.cos(tPhi)
    );
    camLookCur.lerp(CAM_LOOK,.055);
    camera.lookAt(camLookCur);
    speedDisplay+=(spd-speedDisplay)*5*dt;
    document.getElementById('spv').textContent=speedDisplay.toFixed(1);
}

function checkHover(){
    if(animating||entered||!screenMesh) return;
    mVec.set(mouse.x,mouse.y);
    raycaster.setFromCamera(mVec,camera);
    const hit=raycaster.intersectObject(screenMesh).length>0;
    if(hit!==hovering){
        hovering=hit;
        const cur=document.getElementById('cur'),ring=document.getElementById('cur-ring'),hint=document.getElementById('click-hint');
        cur.classList.toggle('hover',hit); ring.classList.toggle('hover',hit);
        hint.classList.toggle('show',hit);
    }
}

function updateIdle(dt){
    clock+=dt;
    const t=clock;

    // ── BLINK system ──
    blinkTimer-=dt;
    if(blinkTimer<=0){
        blinkTimer=3+Math.random()*3.5;
        blinkState=1;
    }
    if(eyeScaleL&&eyeScaleR&&blinkState!==0){
        if(blinkState===1){
            eyeScaleL.scale.y=Math.max(0.05, eyeScaleL.scale.y-dt*18);
            eyeScaleR.scale.y=eyeScaleL.scale.y;
            if(eyeScaleL.scale.y<=0.06) blinkState=2;
        } else if(blinkState===2){
            eyeScaleL.scale.y=Math.min(1, eyeScaleL.scale.y+dt*11);
            eyeScaleR.scale.y=eyeScaleL.scale.y;
            if(eyeScaleL.scale.y>=0.98){ blinkState=0; eyeScaleL.scale.y=1; eyeScaleR.scale.y=1; }
        }
    }

    // Breathing head bob
    if(headG){
        headG.position.y=2.32+Math.sin(t*.78)*.005;
        headG.rotation.y=Math.sin(t*.28)*.04-.02;
        headG.rotation.x=Math.sin(t*.35)*.01+.015;
        headG.rotation.z=Math.sin(t*.55)*.008;
    }
    if(torsoM){
        torsoM.scale.y=1+Math.sin(t*.78)*.012;
        torsoM.rotation.z=Math.sin(t*1.05)*.01;
    }
    // Right hand — mouse movement (fluid)
    if(rightForeArm&&rightHandM){
        rightForeArm.rotation.x=.72+Math.sin(t*4.8)*.1;
        rightForeArm.rotation.z=.06+Math.sin(t*2.9)*.028;
        rightHandM.position.x=.215+Math.sin(t*4.8)*.02;
        rightHandM.position.y=1.0+Math.cos(t*4.8)*.015;
        rightHandM.position.z=.78+Math.sin(t*4.8)*.01;
    }
    // Left hand — typing
    if(leftForeArm&&leftHandM&&leftUpperArm){
        const typingActive=Math.sin(t*.4)>.2;
        leftUpperArm.rotation.z=.14+Math.sin(t*5.8)*.038;
        leftForeArm.rotation.x=.86+Math.sin(t*(typingActive?9.2:1.5))*.1;
        leftHandM.position.y=1.01+Math.sin(t*(typingActive?9.2:1))*.022;
        leftHandM.position.z=.72+Math.cos(t*(typingActive?7.5:1))*.016;
    }
    // Mouse wiggle
    if(mouseMesh){
        mouseMesh.position.x=1.22+Math.sin(t*4.8)*.024;
        mouseMesh.rotation.y=Math.sin(t*4.8)*.08;
    }
    // Screen flicker
    if(screenMat&&!animating){
        const fl=.72+Math.sin(t*52)*.014+Math.sin(t*38)*.008;
        screenMat.emissiveIntensity=fl;
        if(screenLit) screenLit.intensity=hovering?7.0:(3.2+Math.sin(t*1.1)*.25);
    }
}

function updateSteam(){
    if(!steamGeo) return;
    for(let i=0;i<N_STEAM;i++){
        const i3=i*3;
        steamPos[i3]+=steamVel[i3]+Math.sin(clock*.6+steamPhase[i])*.0014;
        steamPos[i3+1]+=steamVel[i3+1];
        steamPos[i3+2]+=steamVel[i3+2];
        if(steamPos[i3+1]>1.88){steamPos[i3]=1.7+(Math.random()-.5)*.08;steamPos[i3+1]=1.3;steamPos[i3+2]=.15+(Math.random()-.5)*.06;}
    }
    steamGeo.attributes.position.needsUpdate=true;
}

function updateDust(){
    if(!dustGeo) return;
    for(let i=0;i<N_DUST;i++){
        const i3=i*3;
        dustPos[i3]+=dustVel[i3]+Math.sin(clock*.22+i)*.0003;
        dustPos[i3+1]+=dustVel[i3+1];
        dustPos[i3+2]+=dustVel[i3+2];
        if(dustPos[i3+1]>9){dustPos[i3]=(Math.random()-.5)*18;dustPos[i3+1]=0;dustPos[i3+2]=(Math.random()-.5)*14;}
    }
    dustGeo.attributes.position.needsUpdate=true;
}

window.addEventListener('resize',()=>{
    camera.aspect=window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth,window.innerHeight);
});

// ─── BOOT ────────────────────────────────────────────────────
function boot(){
    load(0,0);
    setTimeout(()=>{buildRoom();load(22,1);},80);
    setTimeout(()=>{buildDesk();load(38,1);},200);
    setTimeout(()=>{buildMonitor();buildKeyboard();buildMouse();buildDeskItems();load(60,2);},360);
    setTimeout(()=>{buildChair();buildChar();load(76,3);},560);
    setTimeout(()=>{buildLighting();load(88,4);},740);
    setTimeout(()=>{buildSteam();buildDust();load(97,5);},920);
    setTimeout(()=>{load(100,5);startLoop();},1150);
}

function startLoop(){
    let last=performance.now();
    function loop(ts){
        requestAnimationFrame(loop);
        const dt=Math.min((ts-last)/1000,.05); last=ts;
        if(!entered){
            drawScreen(ts);
            if(screenTex) screenTex.needsUpdate=true;
            updateCam(dt);
            updateIdle(dt);
            updateSteam();
            updateDust();
            checkHover();
        }
        renderer.render(scene,camera);
    }
    loop(performance.now());
}

boot();
})();
</script>
